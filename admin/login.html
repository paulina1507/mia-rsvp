<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login RSVP</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="card">
      <h1>Acceso cliente</h1>

      <p class="subtitle">
        Inicia sesión para administrar tus invitados y sus confirmaciones.
      </p>

      <form id="loginForm">
        <label for="email">Correo</label>
        <input type="email" id="email" placeholder="laura@test.com" required />

        <br />

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required />

        <br />

        <button type="submit" id="btnLogin" class="btn">Entrar</button>
      </form>

      <div id="msg" class="muted" style="margin-top: 10px"></div>
    </div>

<script>
  const API_BASE = "/api";
  const form = document.getElementById("loginForm");
  const msg = document.getElementById("msg");
  const btnLogin = document.getElementById("btnLogin");

  function showMessage(text, type = "error") {
    msg.className = "msg " + type;
    msg.textContent = text;
  }

  async function checkSession() {
    try {
      const res = await fetch(`${API_BASE}/auth/me.php`, {
        method: "GET",
        credentials: "include",
      });

      const text = await res.text();
      let data;

      try {
        data = JSON.parse(text);
      } catch (e) {
        console.error("Respuesta no válida del servidor en me.php:", text);
        return;
      }

      if (data.ok) {
        window.location.href = "panel.html";
      }
    } catch (error) {
      console.log("Sesión aún no iniciada");
    }
  }

form.addEventListener("submit", async function (e) {
  e.preventDefault();

  msg.className = "msg";
  msg.textContent = "";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  btnLogin.disabled = true;
  btnLogin.textContent = "Entrando...";

  try {
    const res = await fetch(`${API_BASE}/auth/login.php`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      credentials: "include",
      body: JSON.stringify({ email, password }),
    });

    const text = await res.text();
    console.log("Respuesta login.php:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      showMessage("La API devolvió una respuesta inválida", "error");
      return;
    }

    if (!data.ok) {
      showMessage(data.message || "No se pudo iniciar sesión", "error");
      return;
    }

    showMessage("Login correcto. Redirigiendo...", "success");

    setTimeout(() => {
      window.location.href = "panel.html";
    }, 700);
  } catch (error) {
    console.error(error);
    showMessage("Error de conexión con la API", "error");
  } finally {
    btnLogin.disabled = false;
    btnLogin.textContent = "Entrar";
  }
});

  checkSession();
</script>
  </body>
</html>
